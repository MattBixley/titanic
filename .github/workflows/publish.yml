name: Render and Publish

# Render the Quarto website and publish it to GitHub Pages on every push to
# master. The render step executes the model .qmd documents, which can be slow
# and memory-heavy — especially the neural-net (brulee/torch) leaderboard doc.
# To keep CI fast and stable, the Quarto site should use `freeze: auto` (the
# Quarto agent configures this in _quarto.yml) so unchanged docs are not
# re-executed on every run, and heavy results are committed under _freeze/.

on:
  push:
    branches: [master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto website
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: .

      - name: Publish to GitHub Pages (gh-pages branch)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          # Provided automatically by Actions; needed to push to gh-pages.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
